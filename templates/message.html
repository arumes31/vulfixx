{{define "content"}}
<div class="max-w-2xl mx-auto glass border border-white/10 rounded-[2.5rem] p-16 mt-12 shadow-2xl text-center">
    <div class="w-20 h-20 bg-primary/10 rounded-3xl flex items-center justify-center mx-auto mb-8 border border-primary/20">
        <span class="material-symbols-outlined text-4xl text-primary">info</span>
    </div>
    <h1 class="text-3xl font-black text-white mb-4 tracking-tight">{{.Title}}</h1>
    <p class="text-gray-400 leading-relaxed mb-10">{{.Message}}</p>
    <div class="flex justify-center">
        <a href="/" class="bg-primary text-on-primary font-black uppercase tracking-widest text-xs py-4 px-10 rounded-2xl transition-all shadow-lg shadow-primary/20 hover:bg-primary/80 active:scale-95">
            Return to Core
        </a>
    </div>
</div>
{{end}}
