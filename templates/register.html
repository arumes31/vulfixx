{{template "base" .}}

{{define "content"}}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="glass border border-white/10 rounded-[2.5rem] p-10 max-w-md w-full shadow-2xl relative overflow-hidden">
        <!-- Decorative subtle gradient glow -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-orange-500"></div>

        <div class="text-center mb-8">
            <img src="/static/img/logo.png" alt="Vulfixx Logo" class="h-16 w-auto mx-auto mb-6">
            <h2 class="text-3xl font-display font-bold tracking-tight text-white">New Operator</h2>
            <p class="text-xs font-label text-gray-500 tracking-widest uppercase mt-3">Initialize new access profile</p>
        </div>

        {{if .Error}}
            <div class="bg-error-container/30 border border-error/30 text-error px-4 py-3 rounded-md text-sm mb-6 flex items-start gap-2">
                <span class="material-symbols-outlined text-[18px]">warning</span>
                <span>{{.Error}}</span>
            </div>
        {{end}}

        <form action="/register" method="POST" class="space-y-6">
            {{.csrfField}}
            <div class="space-y-2">
                <label for="email" class="text-xs font-label font-bold tracking-widest uppercase text-gray-500 block">Email Identity</label>
                <input id="email" type="email" name="email" required placeholder="operator@system.core" autofocus
                       class="w-full bg-white/5 border border-white/10 px-4 py-4 rounded-2xl text-white focus:outline-none focus:border-primary transition-all placeholder:text-white/10">
            </div>
            <div class="space-y-2">
                <label for="password" class="text-xs font-label font-bold tracking-widest uppercase text-gray-500 block">Secure Passphrase (min 8 chars)</label>
                <input id="password" type="password" name="password" required minlength="8" placeholder="••••••••"
                       class="w-full bg-white/5 border border-white/10 px-4 py-4 rounded-2xl text-white focus:outline-none focus:border-primary transition-all placeholder:text-white/10 font-mono tracking-widest">
            </div>
            <div class="space-y-2">
                <label for="password_confirm" class="text-xs font-label font-bold tracking-widest uppercase text-gray-500 block">Confirm Secure Passphrase</label>
                <input id="password_confirm" type="password" name="password_confirm" required minlength="8" placeholder="••••••••"
                       class="w-full bg-white/5 border border-white/10 px-4 py-4 rounded-2xl text-white focus:outline-none focus:border-primary transition-all placeholder:text-white/10 font-mono tracking-widest">
            </div>

            <!-- Captcha Section -->
            <div class="space-y-2">
                <label for="captcha" class="text-xs font-label font-bold tracking-widest uppercase text-gray-500 block">Verify Human Presence</label>
                <div class="flex gap-2">
                    <div id="captcha-container" class="relative group cursor-pointer">
                        <img id="captcha-img" src="/captcha" alt="Captcha Challenge" class="rounded-xl border border-white/10 h-[58px] min-w-[120px] bg-white/5">
                        <div class="absolute inset-0 bg-primary/20 opacity-0 group-hover:opacity-100 transition-opacity rounded-xl flex items-center justify-center">
                            <span class="material-symbols-outlined text-white text-sm">refresh</span>
                        </div>
                    </div>
                    <input id="captcha" type="number" name="captcha" required placeholder="?"
                           class="flex-1 bg-white/5 border border-white/10 px-4 py-4 rounded-2xl text-white focus:outline-none focus:border-primary transition-all placeholder:text-white/10 font-mono text-center">
                </div>
                <p class="text-[10px] text-gray-600 italic">Click the image to refresh challenge</p>
            </div>

            <button type="submit" class="w-full bg-primary text-on-primary font-bold font-label tracking-widest uppercase py-4 rounded-2xl shadow-lg shadow-primary/20 hover:bg-primary/80 transition-all duration-300 active:scale-95">
                Initialize Profile
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/5 text-center space-y-4">
            <p class="text-sm font-label text-gray-500">Active profile exists? <a href="/login" class="text-primary hover:underline font-bold tracking-widest uppercase">Authenticate</a></p>
            <p class="text-xs font-label text-gray-600 italic tracking-widest uppercase">
                Awaiting link? <a href="/resend-verification" class="text-gray-400 hover:text-primary transition-colors">Resend Verification</a>
            </p>
        </div>
    </div>
</div>

<script nonce="{{.Nonce}}">
    document.getElementById('captcha-container')?.addEventListener('click', () => {
        const img = document.getElementById('captcha-img');
        if (img) img.src = '/captcha?t=' + Date.now();
    });
</script>
{{end}}
