{{template "base" .}}

{{define "content"}}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="bg-surface-container border border-outline-variant/30 rounded-xl p-8 max-w-md w-full shadow-2xl relative overflow-hidden">
        <!-- Decorative subtle gradient glow -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-container"></div>

        <div class="text-center mb-8">
            <span class="material-symbols-outlined text-4xl text-primary mb-2" style="font-variation-settings: 'FILL' 1;">shield_person</span>
            <h2 class="text-2xl font-display font-bold tracking-wide">System Authentication</h2>
            <p class="text-sm font-label text-on-surface-variant tracking-widest uppercase mt-2">Identify to access telemetry</p>
        </div>

        {{if .Message}}
            <div class="bg-primary/10 border border-primary/30 text-primary px-4 py-3 rounded-md text-sm mb-6 flex items-start gap-2">
                <span class="material-symbols-outlined text-[18px]">info</span>
                <span>{{.Message}}</span>
            </div>
        {{end}}
        {{if .Error}}
            <div class="bg-error-container/30 border border-error/30 text-error px-4 py-3 rounded-md text-sm mb-6 flex items-start gap-2">
                <span class="material-symbols-outlined text-[18px]">warning</span>
                <span>{{.Error}}</span>
            </div>
        {{end}}

        <form action="/login" method="POST" class="space-y-6">
            {{.csrfField}}
        {{if .RequireTOTP}}
            <div class="space-y-2">
                <label for="totp_code" class="text-xs font-label font-bold tracking-widest uppercase text-on-surface-variant block">TOTP Code</label>
                <input id="totp_code" type="text" name="totp_code" required maxlength="6" pattern="\d{6}" placeholder="123456" autofocus
                       class="w-full bg-surface-container-low border-b-2 border-outline-variant/50 focus:border-primary px-4 py-3 rounded-t-md text-on-surface focus:outline-none transition-colors font-mono tracking-widest placeholder:text-on-surface-variant/30">
            </div>
        {{else}}
            <div class="space-y-2">
                <label for="email" class="text-xs font-label font-bold tracking-widest uppercase text-on-surface-variant block">Email Operator</label>
                <input id="email" type="email" name="email" required placeholder="operator@system.core" autofocus
                       class="w-full bg-surface-container-low border-b-2 border-outline-variant/50 focus:border-primary px-4 py-3 rounded-t-md text-on-surface focus:outline-none transition-colors placeholder:text-on-surface-variant/30">
            </div>
            <div class="space-y-2">
                <label for="password" class="text-xs font-label font-bold tracking-widest uppercase text-on-surface-variant block">Passphrase</label>
                <input id="password" type="password" name="password" required placeholder="••••••••"
                       class="w-full bg-surface-container-low border-b-2 border-outline-variant/50 focus:border-primary px-4 py-3 rounded-t-md text-on-surface focus:outline-none transition-colors placeholder:text-on-surface-variant/30 font-mono tracking-widest">
            </div>
        {{end}}
            <button type="submit" class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold font-label tracking-widest uppercase py-3 rounded-md shadow-[0_0_15px_rgba(0,218,243,0.3)] hover:shadow-[0_0_25px_rgba(0,218,243,0.5)] transition-all duration-300">
                Authenticate
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-outline-variant/30 text-center">
            <p class="text-sm font-label text-on-surface-variant">Unregistered operator? <a href="/register" class="text-primary hover:underline font-bold tracking-widest uppercase">Request Access</a></p>
        </div>
    </div>
</div>
{{end}}
