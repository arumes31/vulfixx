{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVE Tracker</title>
    <meta name="csrf-token" content="{{.csrfToken}}">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div id="branding">
                <h1>CVE Tracker</h1>
            </div>
            <nav>
                <ul>
                    {{if .UserLoggedIn}}
                        <li><a href="/dashboard">Dashboard</a></li>
                        <li><a href="/subscriptions">Subscriptions</a></li>
                        <li><form id="logout-form" action="/logout" method="POST" style="display:inline;">
        {{ .csrfField }}<button type="submit" style="background:none;border:none;padding:0;color:inherit;cursor:pointer;font:inherit;">Logout</button></form></li>
                    {{else}}
                        <li><a href="/login">Login</a></li>
                        <li><a href="/register">Register</a></li>
                    {{end}}
                </ul>
            </nav>
        </div>
    </header>
    <div class="container">
        {{template "content" .}}
    </div>
</body>
</html>
{{end}}
