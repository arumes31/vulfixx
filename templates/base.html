{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVE Tracker</title>
    <meta name="csrf-token" content="{{.csrfToken}}">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div id="branding">
                <h1>CVE Tracker</h1>
            </div>
            <nav>
                <ul>
                    {{if .UserLoggedIn}}
                        <li><a href="/dashboard">Dashboard</a></li>
                        <li><a href="/subscriptions">Subscriptions</a></li>
                        <li><form id="logout-form" action="/logout" method="POST" style="display:inline;">
        {{ .csrfField }}<button type="submit" style="background:none;border:none;padding:0;color:inherit;cursor:pointer;font:inherit;">Logout</button></form></li>
                    {{else}}
                        <li><a href="/login">Login</a></li>
                        <li><a href="/register">Register</a></li>
                    {{end}}
                    <li><button id="theme-toggle" class="btn" title="Toggle Dark Mode" style="padding: 2px 8px; margin-left: 10px; font-size: 1.2em;">🌙</button></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="container">
        {{template "content" .}}
    </div>
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const body = document.body;
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            toggleBtn.textContent = '☀️';
        }
        toggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                toggleBtn.textContent = '☀️';
            } else {
                localStorage.setItem('theme', 'light');
                toggleBtn.textContent = '🌙';
            }
        });
    </script>
</body>
</html>
{{end}}
