version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USER=cveuser
      - DB_PASSWORD=cvepass
      - DB_NAME=cvetracker
      - DB_PORT=5432
      - REDIS_URL=redis:6379
      - SESSION_KEY=${SESSION_KEY}
      - SMTP_HOST=${SMTP_HOST:-smtp.example.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-user@example.com}
      - SMTP_PASS=${SMTP_PASS:-password}
      - BASE_URL=${BASE_URL:-http://localhost:8080}
      - CSRF_KEY=${CSRF_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_TOTP_SECRET=${ADMIN_TOTP_SECRET}
      - SCALPER_URL=http://scalper:9090
      - SCALPER_GRPC_URL=scalper:9090
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://ollama:11434}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
      - redis
      - scalper
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=cveuser
      - POSTGRES_PASSWORD=cvepass
      - POSTGRES_DB=cvetracker
    # ports:
    #   - "5432:5432"  # Only expose for local development; not for production
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # ports:
    #   - "6379:6379"  # Only expose for local development; not for production
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  scalper:
    build: ./addons/darknet-scalper
    depends_on:
      - db
      - redis
    environment:
      - PORT=9090
      - REDIS_URL=redis:6379
      - DATABASE_URL=postgres://cveuser:cvepass@db:5432/cvetracker?sslmode=disable
      - SQLITE_PATH=/data/darknet_intel.db
    volumes:
      - ./data/scalper:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: unless-stopped
    
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ./data/ollama:/root/.ollama
    restart: unless-stopped

volumes:
  pgdata:

# Volumes: pgdata is a named volume, redis/scalper use bind mounts to local directories.
