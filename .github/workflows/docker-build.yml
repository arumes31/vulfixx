name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "v2_test" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: cveuser
          POSTGRES_PASSWORD: cvepass
          POSTGRES_DB: cvetracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    container:
      image: golang:1.26-alpine
    env:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: cveuser
      DB_PASSWORD: cvepass
      DB_NAME: cvetracker
      REDIS_URL: redis:6379
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: apk add --no-cache git build-base
      - name: Run tests
        run: go test -v -race ./...

  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest
    container:
      image: golang:1.26
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run golangci-lint
        run: |
          go install -v github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.5
          GOFLAGS="-buildvcs=false" $(go env GOPATH)/bin/golangci-lint run --timeout=10m

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    container:
      image: golang:1.26-alpine
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Gosec
        run: apk add --no-cache git && go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run Gosec Security Scanner
        run: gosec ./...

  build:
    name: Build & Push Image
    needs: [test, lint, security]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
