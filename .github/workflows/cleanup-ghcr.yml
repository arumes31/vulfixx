name: Manual GHCR Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    name: Cleanup GHCR Images
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete old GHCR images
        uses: snok/container-retention-policy@v3.0.1
        with:
          # For personal accounts, 'account' must be set to 'user'
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: ${{ github.event.repository.name }}
          # Keep at least 10 versions of the image
          keep-n-most-recent: 10
          # Exclude images tagged 'latest' and 'main'
          # Syntax: "* !latest !main" means all tags except latest and main
          image-tags: "* !latest !main"
          # Dry run mode - set to false to actually delete
          dry-run: true
