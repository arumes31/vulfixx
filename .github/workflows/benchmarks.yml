name: Performance Benchmarks

on:
  push:
    branches: [ main, v2_test ]
  pull_request:
    branches: [ main, v2_test ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run Benchmarks
        run: go test -bench=. ./internal/... | tee bench_output.txt
      - name: Check Latency Thresholds
        run: |
          if grep -q "Benchmark" bench_output.txt; then
            echo "Benchmarks completed successfully."
          else
            echo "No benchmarks found!"
          fi
