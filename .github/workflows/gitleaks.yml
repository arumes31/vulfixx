name: Gitleaks

on:
  push:
    branches: [ main, v2_test ]
  pull_request:
    branches: [ main, v2_test ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Run daily to catch any leaks in historical commits

jobs:
  scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for historical scan

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
